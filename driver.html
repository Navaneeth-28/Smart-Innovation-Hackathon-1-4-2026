<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver GPS Sender</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #e0f2fe, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* MAIN CARD */
.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* HEADINGS */
h2 {
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #64748b;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    font-size: 15px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #15803d;
}

/* STATUS */
#status {
    margin-top: 15px;
    font-size: 13px;
    color: #334155;
}

#loginStatus {
    margin-top: 10px;
    font-size: 13px;
    color: #2563eb;
}

/* DIVIDER */
hr {
    margin: 20px 0;
    border: none;
    height: 1px;
    background: #e2e8f0;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔐 LOGIN SECTION -->
<h2>🚍 Driver Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<div id="loginStatus"></div>

<hr>

<!-- 🚍 TRACKING SECTION -->
<p>Start sharing your live location</p>

<button onclick="startTracking()" id="startBtn" style="display:none;">
Start Sharing Location
</button>

<div id="status"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Auth -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

// 🔥 SAME Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCWF2kltifXDALMujuJLk1EnlBJQi-JK0M",
  authDomain: "smarttransport-858d4.firebaseapp.com",
  databaseURL: "https://smarttransport-858d4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smarttransport-858d4",
  storageBucket: "smarttransport-858d4.firebasestorage.app",
  messagingSenderId: "382430830939",
  appId: "1:382430830939:web:ded4104e01a7805c00fa7e"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

// 🔐 Driver → Bus mapping
const driverBusMap = {
    "driver1@gmail.com": "101",
    "driver2@gmail.com": "102"
};

// 🔐 LOGIN FUNCTION
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
        document.getElementById("loginStatus").innerText = "Login successful ✅";
        document.getElementById("startBtn").style.display = "inline-block";
    })
    .catch((error) => {
        document.getElementById("loginStatus").innerText = error.message;
    });
}

// 🚍 ORIGINAL LOGIC (UNCHANGED)
function startTracking() {

    if (!auth.currentUser) {
        alert("Please login first");
        return;
    }

    if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
    }

    document.getElementById("status").innerText = "Tracking started...";

    setInterval(() => {

        navigator.geolocation.getCurrentPosition(
            (position) => {

                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                const driverEmail = auth.currentUser.email;
                const busId = driverBusMap[driverEmail];

                if (!busId) {
                    alert("No bus assigned to this driver");
                    return;
                }

                db.ref("buses/" + busId).set({
                    lat: lat,
                    lng: lng
                });

                document.getElementById("status").innerText =
                    `Updated: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

                console.log("Sent:", lat, lng);
            },
            (error) => {
                console.error(error);
                document.getElementById("status").innerText = "Location error";
            }
        );

    }, 3000);
}

</script>

</body>
</html>
